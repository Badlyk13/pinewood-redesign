<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="forest" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E4A2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A2F1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>
  
  <!-- Mountains -->
  <path d="M0 600 L400 300 L800 600 L1200 250 L1600 550 L1920 400 L1920 1080 L0 1080 Z" fill="#1A2F1A" opacity="0.6"/>
  
  <!-- Forest -->
  <rect y="600" width="1920" height="480" fill="url(#forest)"/>
  
  <!-- House silhouette -->
  <rect x="760" y="500" width="400" height="300" fill="#E8DCC4"/>
  <polygon points="760,500 960,350 1160,500" fill="#2E4A2A"/>
  
  <!-- Windows -->
  <rect x="800" y="550" width="120" height="150" fill="#667eea" opacity="0.8"/>
  <rect x="1000" y="550" width="120" height="150" fill="#667eea" opacity="0.8"/>
  
  <!-- Text overlay hint -->
  <text x="100" y="200" fill="white" font-family="Arial" font-size="48" opacity="0.5">
    Hero Image Placeholder
  </text>
  <text x="100" y="260" fill="white" font-family="Arial" font-size="24" opacity="0.5">
    Replace with actual house photo
  </text>
</svg>
